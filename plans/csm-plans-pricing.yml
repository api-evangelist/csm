description: >-
  CSM offers tiered subscription plans (Cube tiers) bundling API access at mid- and
  upper-tiers. The 2026 single-click model pipeline is available across all Cube tiers
  including a free entry. Per-call API rate sheet is not openly listed; verify pricing on
  CSM dashboard or with sales.
notes: Per-API call price not openly published; subscription tier choice gates API access.
sources:
- https://www.csm.ai/
- https://docs.csm.ai/
plans:
- id: csm-cube-free
  name: Cube Free
  type: free
  description: Free Cube tier with access to the single-click 3D model pipeline.
  entries:
  - label: Plan Fee
    name: plan_fee
    type: flat
    metric: month
    limit: 1
    timeFrame: month
    geo: global
    unit: 1
    price: 0 USD/month
    userMultiplied: false
- id: csm-cube-paid
  name: Cube Paid Tiers
  type: subscription
  description: Mid-tier paid plans unlock higher generation throughput and API access.
  entries:
  - label: Plan Fee
    name: plan_fee
    type: subscription
    metric: month
    limit: 1
    timeFrame: month
    geo: global
    unit: 1
    price: see csm.ai pricing
    userMultiplied: true
- id: csm-enterprise
  name: Enterprise
  type: enterprise
  description: High-volume contracts for games, robotics, synthetic data with negotiated SLAs.
  entries:
  - label: Enterprise Contract
    name: enterprise
    type: flat
    metric: contract
    limit: -1
    timeFrame: annual
    geo: global
    unit: 1
    price: contact sales
    userMultiplied: false
