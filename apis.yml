name: Common Sense Machines
kind: company
description: >-
  Common Sense Machines (CSM) builds 3D world models with image-to-3D and 3D world
  simulation APIs aimed at games, robotics, and synthetic data. The CSM Cube product
  family released a single-click model pipeline with mesh-parts-based topology in early
  2026. API access is bundled with mid-tier and enterprise CSM subscription plans.
