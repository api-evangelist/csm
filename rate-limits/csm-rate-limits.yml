specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Common Sense Machines
providerId: csm
created: '2026-05-08'
modified: '2026-05-08'
reconciled: partial
tags:
- AI
- 3D
- World Models
- Scene Generation
- Generative
- Rate Limiting
- Quotas
- Throttling
description: >-
  CSM rate-limits primarily by Cube subscription tier. Per-tier concurrency and per-RPS
  caps are not publicly documented; standard 429 backoff applies. Higher Cube tiers enable
  API access plus expanded generation throughput.
notes: Subscription plan choice gates API access and likely concurrent generation throughput.
sources:
- https://docs.csm.ai/
- https://www.csm.ai/
responseCodes:
  throttled: 429
limits:
- name: Plan-Tier Concurrency
  scope: account
  metric: concurrent_jobs
  limit: see Cube plan
- name: HTTP Requests
  scope: account
  metric: requests
  limit: not publicly documented
policies:
- name: Backoff Strategy
  description: Clients should implement exponential backoff with jitter and honor any Retry-After header.
- name: Tier Selection
  description: Mid-tier and Enterprise plans unlock API access; verify with CSM team for production.
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
